apiVersion: v1
kind: Service
metadata:
  name: {{ include "helm.fullname" . }}-payment-service
  labels:
    {{- include "helm.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: payment-service
    app.kubernetes.io/instance: {{ .Release.Name }}