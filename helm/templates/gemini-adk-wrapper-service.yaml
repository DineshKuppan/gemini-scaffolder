apiVersion: v1
kind: Service
metadata:
  name: {{ include "multi-tenant-system.fullname" . }}-gemini-adk-wrapper
  labels:
    {{- include "multi-tenant-system.labels" . | nindent 4 }}
    app.kubernetes.io/component: gemini-adk-wrapper
spec:
  type: {{ .Values.geminiAdkWrapper.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.geminiAdkWrapper.service.port | default 8002 }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "multi-tenant-system.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gemini-adk-wrapper