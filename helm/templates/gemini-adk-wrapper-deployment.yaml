apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gemini-adk-wrapper.fullname" . }}
  labels:
    app: gemini-adk-wrapper
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: gemini-adk-wrapper
  template:
    metadata:
      labels:
        app: gemini-adk-wrapper
    spec:
      containers:
        - name: gemini-adk-wrapper
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8000
          env:
            - name: LITELM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-secrets
                  key: litellm-master-key
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-secrets
                  key: gemini-api-key
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10